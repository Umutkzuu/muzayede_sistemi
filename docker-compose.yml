version: '3.8'

services:
  # MongoDB Konteyneri
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Bizim yazdığımız Item Service
  item_service:
    build: ./item_service
    ports:
      - "8001:8001"
    environment:
      - MONGO_DETAILS=mongodb://mongodb:27017
    depends_on:
      - mongodb

volumes:
  mongo_data: